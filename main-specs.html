<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="format-detection" content="telephone=no, date=no, address=no, email=no">
    <title>Характеристики</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Inter', sans-serif;
            background: #fff;
            max-width: 430px;
            margin: 0 auto;
            overflow-x: hidden;
            padding-bottom: 120px;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 16px;
        }

        .save-exit {
            font-size: 15px;
            font-weight: 400;
            color: #9E9E9E;
            cursor: default;
        }

        .page-title {
            margin-top: 12px;
            padding: 0 16px;
            font-weight: 800;
            font-size: 31px;
            color: #1A1A1A;
            line-height: 1.1;
        }

        .specs-list {
            margin-top: 24px;
            padding: 0 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .spec-field {
            display: flex;
            align-items: center;
            background: #F4F4F4;
            border-radius: 12px;
            padding: 14px 16px;
            gap: 10px;
        }

        .spec-icon {
            flex-shrink: 0;
        }

        .spec-label {
            font-size: 13px;
            font-weight: 400;
            color: #9E9E9E;
            display: block;
        }

        .spec-value {
            font-size: 15px;
            font-weight: 400;
            color: #1A1A1A;
            display: block;
        }

        .spec-text { flex: 1; }

        .spec-chevron {
            flex-shrink: 0;
            margin-left: auto;
        }

        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 430px;
            background: #fff;
            padding: 12px 16px 28px;
            z-index: 100;
        }

        .continue-btn {
            display: block;
            width: 100%;
            background: #1A1A1A;
            color: #fff;
            border: none;
            border-radius: 16px;
            padding: 16px;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 400;
            text-align: center;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <header class="header">
        <a href="main-adtype.html">
            <img src="step 2 materials/back.svg" width="48" height="48" alt="">
        </a>
        <span class="save-exit">Сохранить и выйти</span>
    </header>

    <h1 class="page-title">Характеристики</h1>

    <div class="specs-list" id="specs-list"></div>

    <div class="bottom-bar">
        <button class="continue-btn" onclick="goNext()">Продолжить</button>
    </div>

    <script>
        const SPECS = {
            't-shirts': [
                { label: 'Цвет', value: 'Белый', icon: 'color' },
                { label: 'Для кого', value: 'Для девочек', icon: 'person' },
                { label: 'Бренд', value: 'H&M', icon: 'brand' },
                { label: 'Размер', value: '128', icon: 'size' }
            ],
            'homewear': [
                { label: 'Цвет', value: 'Розовый', icon: 'color' },
                { label: 'Для кого', value: 'Для девочек', icon: 'person' },
                { label: 'Бренд', value: 'Без бренда', icon: 'brand' },
                { label: 'Размер', value: '104', icon: 'size' }
            ],
            'suits': [
                { label: 'Цвет', value: 'Синий', icon: 'color' },
                { label: 'Для кого', value: 'Для девочек', icon: 'person' },
                { label: 'Бренд', value: 'Zara Kids', icon: 'brand' },
                { label: 'Размер', value: '116', icon: 'size' }
            ]
        };

        const ICONS = {
            color: `<svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="7" stroke="#1A1A1A" stroke-width="1.5"/><circle cx="10" cy="10" r="3" fill="#1A1A1A"/></svg>`,
            person: `<svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="7" r="3" stroke="#1A1A1A" stroke-width="1.5"/><path d="M4 17c0-3.314 2.686-6 6-6s6 2.686 6 6" stroke="#1A1A1A" stroke-width="1.5" stroke-linecap="round"/></svg>`,
            brand: `<svg width="20" height="20" viewBox="0 0 20 20" fill="none"><rect x="3" y="3" width="14" height="14" rx="3" stroke="#1A1A1A" stroke-width="1.5"/><path d="M7 10h6M7 13h4" stroke="#1A1A1A" stroke-width="1.5" stroke-linecap="round"/></svg>`,
            size: `<svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M3 10h14M3 7l3 3-3 3M17 7l-3 3 3 3" stroke="#1A1A1A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`
        };

        const CHEVRON = `<svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M7.5 5L12.5 10L7.5 15" stroke="#1A1A1A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

        function render() {
            const cat = sessionStorage.getItem('mainCategory') || 't-shirts';
            const specs = SPECS[cat] || SPECS['t-shirts'];
            const list = document.getElementById('specs-list');
            list.innerHTML = specs.map(s => `
                <div class="spec-field">
                    <span class="spec-icon">${ICONS[s.icon]}</span>
                    <span class="spec-text">
                        <span class="spec-label">${s.label}</span>
                        <span class="spec-value">${s.value}</span>
                    </span>
                    <span class="spec-chevron">${CHEVRON}</span>
                </div>
            `).join('');
        }

        function goNext() {
            window.location.href = 'main-describe.html';
        }

        render();
    </script>

</body>
</html>
