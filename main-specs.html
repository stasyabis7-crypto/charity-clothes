<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="format-detection" content="telephone=no, date=no, address=no, email=no">
    <title>Характеристики</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Inter', sans-serif;
            background: #fff;
            max-width: 430px;
            margin: 0 auto;
            overflow-x: hidden;
            padding-bottom: 120px;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 16px;
        }

        .save-exit {
            font-size: 15px;
            font-weight: 400;
            color: #9E9E9E;
            cursor: default;
        }

        .page-title {
            margin-top: 12px;
            padding: 0 16px;
            font-weight: 800;
            font-size: 31px;
            color: #1A1A1A;
            line-height: 1.1;
        }

        .specs-list {
            margin-top: 24px;
            padding: 0 16px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .spec-section { display: flex; flex-direction: column; gap: 0; }

        .spec-label {
            font-size: 15px;
            font-weight: 700;
            color: #1A1A1A;
            margin-bottom: 8px;
        }

        .spec-field {
            display: flex;
            align-items: center;
            background: #F4F4F4;
            border-radius: 12px;
            padding: 14px 16px;
            gap: 8px;
        }

        .spec-value {
            flex: 1;
            font-size: 15px;
            font-weight: 400;
            color: #1A1A1A;
        }

        .spec-helper {
            margin-top: 8px;
            font-size: 13px;
            font-weight: 400;
            color: #9E9E9E;
            line-height: 1.4;
        }

        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 430px;
            background: #fff;
            padding: 12px 16px 28px;
            z-index: 100;
        }

        .continue-btn {
            display: block;
            width: 100%;
            background: #1A1A1A;
            color: #fff;
            border: none;
            border-radius: 16px;
            padding: 16px;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 400;
            text-align: center;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <header class="header">
        <a href="javascript:void(0)" onclick="goBack()">
            <img src="step 2 materials/back.svg" width="48" height="48" alt="">
        </a>
        <span class="save-exit">Сохранить и выйти</span>
    </header>

    <h1 class="page-title">Характеристики</h1>

    <div class="specs-list" id="specs-list"></div>

    <div class="bottom-bar">
        <button class="continue-btn" onclick="goNext()">Продолжить</button>
    </div>

    <script>
        const CHEVRON = `<svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M5 7.5L10 12.5L15 7.5" stroke="#1A1A1A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

        const SPECS = {
            't-shirts': [
                { label: 'Тип одежды', value: 'Футболка' },
                { label: 'Бренд', value: 'H&M', helper: 'Выберите «Без бренда», если марка не указана. Или «Другой», если бренда нет в списке.' },
                { label: 'Цвет', value: 'Белый' },
                { label: 'Для кого', value: 'Для девочек' }
            ],
            'homewear': [
                { label: 'Тип одежды', value: 'Домашний комплект' },
                { label: 'Бренд', value: 'Без бренда', helper: 'Выберите «Без бренда», если марка не указана. Или «Другой», если бренда нет в списке.' },
                { label: 'Цвет', value: 'Розовый' },
                { label: 'Для кого', value: 'Для девочек' }
            ],
            'suits': [
                { label: 'Тип одежды', value: 'Пиджак' },
                { label: 'Бренд', value: 'Zara Kids', helper: 'Выберите «Без бренда», если марка не указана. Или «Другой», если бренда нет в списке.' },
                { label: 'Цвет', value: 'Синий' },
                { label: 'Для кого', value: 'Для девочек' }
            ]
        };

        function render() {
            const cat = sessionStorage.getItem('mainCategory') || 't-shirts';
            const specs = SPECS[cat] || SPECS['t-shirts'];
            const list = document.getElementById('specs-list');
            list.innerHTML = specs.map(s => `
                <div class="spec-section">
                    <span class="spec-label">${s.label}</span>
                    <div class="spec-field">
                        <span class="spec-value">${s.value}</span>
                        ${CHEVRON}
                    </div>
                    ${s.helper ? `<p class="spec-helper">${s.helper}</p>` : ''}
                </div>
            `).join('');
        }

        function goBack() {
            window.location.href = sessionStorage.getItem('prevPage') || 'main-adtype.html';
        }

        function goNext() {
            sessionStorage.setItem('prevPage', 'main-specs.html');
            window.location.href = 'main-describe.html';
        }

        render();
    </script>

</body>
</html>
