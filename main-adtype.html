<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="format-detection" content="telephone=no, date=no, address=no, email=no">
    <title>Тип объявления</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Inter', sans-serif;
            background: #fff;
            max-width: 430px;
            margin: 0 auto;
            overflow-x: hidden;
            padding-bottom: 120px;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 16px;
        }

        .save-exit {
            font-size: 15px;
            font-weight: 400;
            color: #9E9E9E;
            cursor: default;
        }

        .page-title {
            margin-top: 12px;
            padding: 0 16px;
            font-weight: 800;
            font-size: 31px;
            color: #1A1A1A;
            line-height: 1.1;
        }

        .category-list {
            margin-top: 24px;
            padding: 0 16px;
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .category-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 16px 0;
        }

        .category-item.clickable { cursor: pointer; }

        .category-name {
            font-weight: 400;
            font-size: 17px;
            color: #1A1A1A;
            line-height: 1.3;
        }

        .category-name.dimmed { color: #C4C4C4; }

        .checkbox-img {
            width: 21px;
            height: 21px;
            flex-shrink: 0;
        }

        .checkbox-img.dimmed { opacity: 0.3; }

        .bottom-bar {
            display: none;
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 430px;
            background: #fff;
            padding: 12px 16px 28px;
            z-index: 100;
        }

        .continue-btn {
            display: block;
            width: 100%;
            background: #1A1A1A;
            color: #fff;
            border: none;
            border-radius: 16px;
            padding: 16px;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 400;
            text-align: center;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <header class="header">
        <a href="main-condition.html">
            <img src="step 2 materials/back.svg" width="48" height="48" alt="">
        </a>
        <span class="save-exit">Сохранить и выйти</span>
    </header>

    <h1 class="page-title">Тип объявления</h1>

    <div class="category-list">
        <div class="category-item clickable" onclick="selectOption('own')">
            <span class="category-name">Продаю своё</span>
            <img class="checkbox-img" id="cb-own" src="step 4 materials/Checkmark off.png" alt="">
        </div>
        <div class="category-item">
            <span class="category-name dimmed">Продаю чужое</span>
            <img class="checkbox-img dimmed" src="step 4 materials/Checkmark off.png" alt="">
        </div>
        <div class="category-item">
            <span class="category-name dimmed">Сдаю в аренду</span>
            <img class="checkbox-img dimmed" src="step 4 materials/Checkmark off.png" alt="">
        </div>
    </div>

    <div class="bottom-bar" id="bottom-bar">
        <button class="continue-btn" onclick="goNext()">Продолжить</button>
    </div>

    <script>
        let selected = sessionStorage.getItem('mainAdType') || null;

        function selectOption(id) {
            selected = selected === id ? null : id;
            if (selected) sessionStorage.setItem('mainAdType', selected);
            else sessionStorage.removeItem('mainAdType');
            render();
        }

        function render() {
            const cb = document.getElementById('cb-own');
            cb.src = selected === 'own'
                ? 'step 4 materials/Checkmark on.png'
                : 'step 4 materials/Checkmark off.png';
            document.getElementById('bottom-bar').style.display = selected ? 'block' : 'none';
        }

        function goNext() {
            if (!selected) return;
            window.location.href = 'main-specs.html';
        }

        render();
    </script>

</body>
</html>
