<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="format-detection" content="telephone=no, date=no, address=no, email=no">
    <title>Новое объявление</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #FFFFFF;
            max-width: 430px;
            margin: 0 auto;
            overflow-x: hidden;
        }

        /* ===== HEADER ===== */
        .header {
            display: flex;
            align-items: center;
            padding: 16px 16px;
        }

        .header-close {
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }

        /* ===== PAGE TITLE ===== */
        .page-title {
            margin-top: 12px;
            padding: 0 16px;
            font-family: 'Inter', sans-serif;
            font-weight: 800;
            font-size: 31px;
            color: #1A1A1A;
            line-height: 1.1;
        }

        /* ===== CATEGORY LIST ===== */
        .category-list {
            margin-top: 24px;
            padding: 0 16px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .category-item {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            cursor: pointer;
        }

        .category-item img {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            object-fit: cover;
            flex-shrink: 0;
        }

        .category-item span {
            font-family: 'Inter', sans-serif;
            font-weight: 400;
            font-size: 15px;
            color: #1A1A1A;
            line-height: 1.3;
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header class="header">
        <a href="ads.html" class="header-close">
            <img src="step 1/close.svg" width="40" height="40" alt="Закрыть">
        </a>
    </header>

    <!-- PAGE TITLE -->
    <h1 class="page-title">Новое объявление</h1>

    <!-- CATEGORY LIST -->
    <div class="category-list">
        <div class="category-item">
            <img src="step 1/transport.png" alt="">
            <span>Транспорт</span>
        </div>
        <div class="category-item">
            <img src="step 1/estate.png" alt="">
            <span>Недвижимость</span>
        </div>
        <div class="category-item">
            <img src="step 1/work.png" alt="">
            <span>Работа</span>
        </div>
        <div class="category-item">
            <img src="step 1/services.png" alt="">
            <span>Услуги</span>
        </div>
        <div class="category-item">
            <img src="step 1/things.png" alt="">
            <span>Вещи, электроника, хобби, животные</span>
        </div>
        <div class="category-item">
            <img src="step 1/business.png" alt="">
            <span>Готовый бизнес и оборудование</span>
        </div>
    </div>

</body>
</html>
