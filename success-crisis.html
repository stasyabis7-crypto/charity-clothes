<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="format-detection" content="telephone=no, date=no, address=no, email=no">
    <title>Спасибо за помощь</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Inter', sans-serif;
            background: #fff;
            max-width: 430px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* HEADER */
        .header {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px 16px;
            flex-shrink: 0;
        }

        .header-title {
            font-size: 17px;
            font-weight: 600;
            color: #1A1A1A;
            line-height: 24px;
        }

        .header-close {
            position: absolute;
            right: 16px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: none;
            border: none;
            padding: 0;
            cursor: default;
            opacity: 0.35;
        }

        /* MAIN BLOCK — fills remaining space, centered */
        .main-block {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0 16px 140px;
            text-align: center;
        }

        .fond-img {
            width: 263px;
            height: 174px;
            object-fit: contain;
        }

        .success-title {
            margin-top: 16px;
            font-size: 22px;
            font-weight: 700;
            color: #1A1A1A;
            line-height: 28px;
        }

        .success-sub {
            margin-top: 4px;
            font-size: 15px;
            font-weight: 400;
            color: #1A1A1A;
            line-height: 22px;
        }

        .view-btn {
            margin-top: 24px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #F4F4F4;
            border: none;
            border-radius: 16px;
            padding: 14px 20px;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 400;
            color: #1A1A1A;
            cursor: default;
            pointer-events: none;
        }
        .view-btn img { filter: brightness(0); }

        /* BOTTOM */
        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 430px;
            background: #fff;
            padding: 12px 16px 28px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 100;
            border-radius: 24px 24px 0 0;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
        }

        .btn-black {
            display: block;
            width: 100%;
            background: #1A1A1A;
            color: #fff;
            border: none;
            border-radius: 16px;
            padding: 16px;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 400;
            text-align: center;
            cursor: pointer;
        }

        .btn-gray {
            display: block;
            width: 100%;
            background: #F4F4F4;
            color: #1A1A1A;
            border: none;
            border-radius: 16px;
            padding: 16px;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 400;
            text-align: center;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <header class="header">
        <span class="header-title">Спасибо за помощь</span>
        <button class="header-close">
            <img src="new category/CloseButton.svg" width="24" height="24" alt="">
        </button>
    </header>

    <div class="main-block">
        <img class="fond-img" id="fond-img" src="new podacha/success fond 1.png" alt="">

        <div class="success-title">Всё получилось!</div>
        <div class="success-sub" id="success-sub">Опубликуем через минуту для фонда «»</div>

        <button class="view-btn">
            <img src="new podacha/eye icon.svg" width="15" height="11" alt="">
            Как увидит фонд
        </button>
    </div>

    <div class="bottom-bar">
        <button class="btn-black" onclick="window.location.href='step5-crisis.html'">Разместить ещё</button>
        <button class="btn-gray" onclick="window.location.href='ads-2.html'">Мои объявления</button>
    </div>

    <script>
        const FUNDS = {
            1: 'Российский Красный Крест',
            2: 'Ночлежка',
            3: 'Миллион книг',
            4: 'Дари надежду'
        };

        const fondId = Number(sessionStorage.getItem('selectedFundId') || '1');
        const fondName = FUNDS[fondId] || FUNDS[1];

        document.getElementById('fond-img').src = 'new podacha/success fond ' + fondId + '.png';
        document.getElementById('success-sub').textContent = 'Опубликуем через минуту для фонда «' + fondName + '»';
    </script>

</body>
</html>
