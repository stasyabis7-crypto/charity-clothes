<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="format-detection" content="telephone=no, date=no, address=no, email=no">
    <title>Выбор фонда</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Inter', sans-serif;
            background: #fff;
            max-width: 430px;
            margin: 0 auto;
            overflow-x: hidden;
            padding-bottom: 100px;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 16px;
            position: sticky;
            top: 0;
            background: #fff;
            z-index: 50;
        }

        .header-title {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            font-weight: 700;
            line-height: 20px;
            color: #1A1A1A;
            white-space: nowrap;
        }

        .header-close {
            margin-left: auto;
            background: none;
            border: none;
            cursor: pointer;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
        }

        .fund-list {
            margin-top: 8px;
            padding: 0 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .fund-card {
            background: #F2F1F0;
            border-radius: 28px;
            padding: 15px 16px 18px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: border-color 0.15s;
        }

        .fund-card.selected {
            border-color: #1A1A1A;
        }

        .fund-logo {
            width: 40px;
            height: 40px;
            object-fit: contain;
            flex-shrink: 0;
            border-radius: 8px;
        }

        .fund-info {
            flex: 1;
            min-width: 0;
        }

        .fund-name {
            font-family: 'Inter', sans-serif;
            font-size: 18px;
            font-weight: 700;
            line-height: 22px;
            color: #000;
        }

        .fund-sub {
            margin-top: 2px;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 400;
            line-height: 22px;
            color: #000;
        }

        .fund-more-link {
            display: inline-block;
            margin-top: 6px;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 400;
            line-height: 22px;
            color: #000;
            text-decoration: underline;
            cursor: pointer;
        }

        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 430px;
            background: #fff;
            padding: 12px 16px 28px;
            z-index: 100;
            border-radius: 24px 24px 0 0;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
        }

        .select-btn {
            display: block;
            width: 100%;
            background: #1A1A1A;
            color: #fff;
            border: none;
            border-radius: 16px;
            padding: 16px;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 400;
            text-align: center;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <header class="header">
        <span class="header-title">Кому хотите помочь?</span>
        <button class="header-close" onclick="closePage()">
            <img src="new category/CloseButton.svg" width="24" height="24" alt="">
        </button>
    </header>

    <div class="fund-list" id="fund-list"></div>

    <div class="bottom-bar">
        <button class="select-btn" onclick="selectFund()">Выбрать фонд</button>
    </div>

    <script>
        const FUNDS = {
            1: { name: 'Российский Красный Крест', sub: 'Помощь людям, пострадавшим от паводков в Дагестане', logo: 'new podacha/RKK.png' },
            2: { name: 'Ночлежка', sub: 'Мужская одежда и обувь для людей без жилья в Москве и Санкт-Петербурге', logo: 'new podacha/noch.png' },
            3: { name: 'Миллион книг', sub: 'Книги для сельских библиотек', logo: 'new podacha/mil knig.png' },
            4: { name: 'Дари надежду', sub: 'Техника и средства реабилитации для семей, у которых их нет', logo: 'new podacha/dari nad.png' }
        };

        const PHOTO_ID_TO_FUND = {
            1: 1, 2: 1,       // fond 1 photo 1-2 → РКК
            9: 2, 15: 2,      // fond 2 photo 1-2 → Ночлежка
            11: 3, 12: 3,     // fond 3 photo 1-2 → Миллион книг
            16: 4, 10: 4,     // fond 4 photo 1-2 → Дари надежду
        };

        let selectedId = Number(sessionStorage.getItem('selectedFundId') || '1');

        // Auto-detect fund from already-selected photos
        (function() {
            const photos = JSON.parse(sessionStorage.getItem('selectedPhotos') || '[]');
            for (const id of photos) {
                const fundId = PHOTO_ID_TO_FUND[Number(id)];
                if (fundId) {
                    selectedId = fundId;
                    sessionStorage.setItem('selectedFundId', String(fundId));
                    break;
                }
            }
        })();

        let lastTap = { id: 0, time: 0 };

        function render() {
            const list = document.getElementById('fund-list');
            list.innerHTML = '';
            Object.entries(FUNDS).forEach(([id, fund]) => {
                const idNum = Number(id);
                const card = document.createElement('div');
                card.className = 'fund-card' + (selectedId === idNum ? ' selected' : '');
                card.innerHTML = `
                    <img class="fund-logo" src="${fund.logo}" alt="">
                    <div class="fund-info">
                        <div class="fund-name">${fund.name}</div>
                        <div class="fund-sub">${fund.sub}</div>
                        <span class="fund-more-link" data-id="${idNum}">Подробнее о фонде</span>
                    </div>
                `;
                card.addEventListener('click', (e) => {
                    if (e.target.classList.contains('fund-more-link')) {
                        openFundInfo(idNum);
                        return;
                    }
                    const now = Date.now();
                    if (lastTap.id === idNum && now - lastTap.time < 400) {
                        openFundInfo(idNum);
                        lastTap = { id: 0, time: 0 };
                        return;
                    }
                    lastTap = { id: idNum, time: now };
                    selectedId = idNum;
                    render();
                });
                list.appendChild(card);
            });
        }

        function openFundInfo(id) {
            sessionStorage.setItem('selectedFundId', String(selectedId)); // preserve current choice
            sessionStorage.setItem('viewFundId', String(id));
            sessionStorage.setItem('fundInfoReturn', 'fond-choose.html');
            window.location.href = 'fond-info.html';
        }

        function selectFund() {
            sessionStorage.setItem('selectedFundId', String(selectedId));
            sessionStorage.setItem('userPickedFund', '1');
            sessionStorage.removeItem('initialPackCategories');
            window.location.href = 'step5-crisis.html';
        }

        function closePage() {
            window.location.href = 'step5-crisis.html';
        }

        render();
    </script>

</body>
</html>
