<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="format-detection" content="telephone=no, date=no, address=no, email=no">
    <title>Описание товара</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Inter', sans-serif;
            background: #fff;
            max-width: 430px;
            margin: 0 auto;
            overflow-x: hidden;
            padding-bottom: 120px;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 16px;
        }

        .save-exit {
            font-size: 15px;
            font-weight: 400;
            color: #9E9E9E;
            cursor: default;
        }

        .page-title {
            margin-top: 12px;
            padding: 0 16px;
            font-weight: 800;
            font-size: 31px;
            color: #1A1A1A;
            line-height: 1.1;
        }

        .describe-wrap {
            margin-top: 24px;
            padding: 0 16px;
        }

        .describe-textarea {
            display: block;
            width: 100%;
            min-height: 160px;
            background: #F4F4F4;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 400;
            color: #1A1A1A;
            outline: none;
            resize: none;
            overflow: hidden;
            line-height: 1.45;
        }

        .charity-hint {
            display: none;
            margin-top: 24px;
            border: none;
            border-radius: 20px;
            background: linear-gradient(98deg, #C9F0FF 5.5%, #E7D9FF 91.57%);
            padding: 18px 18px 22px 18px;
            align-items: flex-start;
            gap: 12px;
            text-align: left;
            cursor: pointer;
            width: 343px;
        }

        .charity-hint.visible { display: flex; }

        .charity-hint-img {
            width: 60px;
            height: 60px;
            border-radius: 10px;
            object-fit: cover;
            flex-shrink: 0;
            background: #fff;
        }

        .charity-hint-title {
            font-size: 16px;
            font-weight: 700;
            line-height: 1.25;
            color: #000;
        }

        .charity-hint-sub {
            margin-top: 2px;
            font-size: 13px;
            font-weight: 400;
            line-height: 1.3;
            color: #000;
        }

        .charity-link {
            display: block;
            margin-top: 6px;
            font-size: 13px;
            font-weight: 400;
            color: #000;
            text-decoration: underline;
        }

        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 430px;
            background: #fff;
            padding: 12px 16px 28px;
            z-index: 100;
        }

        .continue-btn {
            display: block;
            width: 100%;
            background: #1A1A1A;
            color: #fff;
            border: none;
            border-radius: 16px;
            padding: 16px;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 400;
            text-align: center;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <header class="header">
        <a href="javascript:void(0)" onclick="goBack()">
            <img src="step 2 materials/back.svg" width="48" height="48" alt="">
        </a>
        <span class="save-exit">Сохранить и выйти</span>
    </header>

    <h1 class="page-title">Описание товара</h1>

    <div class="describe-wrap">
        <textarea
            class="describe-textarea"
            id="describe-ta"
            placeholder="Опишите ваш товар подробнее"
        ></textarea>
        <div class="charity-hint" id="charity-hint" onclick="goToCharity()">
            <div style="flex:1;min-width:0;">
                <div class="charity-hint-title">Похоже, ваши вещи подходят фондам</div>
                <div class="charity-hint-sub">Вы можете бесплатно передать вещи на благотворительность через объявление Авито</div>
                <span class="charity-link">Передать вещи</span>
            </div>
            <img class="charity-hint-img" src="sbor 2 new.png" alt="">
        </div>
    </div>

    <div class="bottom-bar">
        <button class="continue-btn" onclick="goNext()">Продолжить</button>
    </div>

    <script>
        const TRIGGER_WORDS = [
            'вещи пакет', 'одежд', 'обувь', 'куртк', 'пальт', 'шуб',
            'коляск', 'игрушк', 'детск', 'пиджак', 'костюм', 'майк',
            'футболк', 'аксессуар', 'варежк', 'шарф', 'конструктор'
        ];

        const CONDITION_NAMES = {
            'new-tag': 'Новое, с биркой',
            'excellent': 'Отличное',
            'good': 'Хорошее',
            'fair': 'Удовлетворительное'
        };

        const SPECS_DATA = {
            't-shirts':  { label: 'Футболки и майки',    color: 'Белый',   forWhom: 'Для девочек', brand: 'H&M',       size: '128' },
            'homewear':  { label: 'Домашняя одежда',      color: 'Розовый', forWhom: 'Для девочек', brand: 'Без бренда', size: '104' },
            'suits':     { label: 'Пиджаки и костюмы',   color: 'Синий',   forWhom: 'Для девочек', brand: 'Zara Kids', size: '116' }
        };

        const ta = document.getElementById('describe-ta');
        const hint = document.getElementById('charity-hint');

        ta.addEventListener('input', function() {
            ta.style.height = 'auto';
            ta.style.height = ta.scrollHeight + 'px';
            sessionStorage.setItem('mainDesc', ta.value);
            checkTrigger();
        });

        function checkTrigger() {
            hint.classList.toggle('visible', ta.value.trim().length > 0);
        }

        function buildFullDescription() {
            const cat = sessionStorage.getItem('mainCategory') || '';
            const condId = sessionStorage.getItem('mainCondition') || '';
            const specs = SPECS_DATA[cat];
            const descText = ta.value.trim();

            const parts = [];
            if (condId && CONDITION_NAMES[condId]) {
                parts.push('Состояние: ' + CONDITION_NAMES[condId]);
            }
            if (specs) {
                parts.push(`Цвет: ${specs.color}, Для кого: ${specs.forWhom}, Бренд: ${specs.brand}, Размер: ${specs.size}`);
            }
            if (descText) parts.push(descText);

            return parts.join('\n\n');
        }

        function goToCharity() {
            const desc = buildFullDescription();
            sessionStorage.setItem('adDesc', desc);
            sessionStorage.removeItem('adCategories');
            sessionStorage.setItem('adCollection', 'crisis');
            window.location.href = 'step5-crisis.html';
        }

        function goBack() {
            window.location.href = sessionStorage.getItem('prevPage') || 'main-specs.html';
        }

        function goNext() {
            sessionStorage.setItem('mainDesc', ta.value);
            sessionStorage.setItem('prevPage', 'main-describe.html');
            window.location.href = 'main-address.html';
        }

        const saved = sessionStorage.getItem('mainDesc');
        if (saved) {
            ta.value = saved;
            ta.style.height = ta.scrollHeight + 'px';
            checkTrigger();
        }
    </script>

</body>
</html>
