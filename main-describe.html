<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="format-detection" content="telephone=no, date=no, address=no, email=no">
    <title>Описание товара</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Inter', sans-serif;
            background: #fff;
            max-width: 430px;
            margin: 0 auto;
            overflow-x: hidden;
            padding-bottom: 120px;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 16px;
        }

        .save-exit {
            font-size: 15px;
            font-weight: 400;
            color: #9E9E9E;
            cursor: default;
        }

        .page-title {
            margin-top: 12px;
            padding: 0 16px;
            font-weight: 800;
            font-size: 31px;
            color: #1A1A1A;
            line-height: 1.1;
        }

        .describe-wrap {
            margin-top: 24px;
            padding: 0 16px;
        }

        .describe-textarea {
            display: block;
            width: 100%;
            min-height: 160px;
            background: #F4F4F4;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 400;
            color: #1A1A1A;
            outline: none;
            resize: none;
            overflow: hidden;
            line-height: 1.45;
        }

        .charity-hint {
            display: none;
            margin-top: 10px;
            font-size: 14px;
            font-weight: 400;
            color: #9E9E9E;
            line-height: 1.5;
            padding: 0 2px;
        }

        .charity-hint.visible { display: block; }

        .charity-link {
            color: #9E9E9E;
            text-decoration: underline;
            cursor: pointer;
        }

        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 430px;
            background: #fff;
            padding: 12px 16px 28px;
            z-index: 100;
        }

        .continue-btn {
            display: block;
            width: 100%;
            background: #1A1A1A;
            color: #fff;
            border: none;
            border-radius: 16px;
            padding: 16px;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 400;
            text-align: center;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <header class="header">
        <a href="main-specs.html">
            <img src="step 2 materials/back.svg" width="48" height="48" alt="">
        </a>
        <span class="save-exit">Сохранить и выйти</span>
    </header>

    <h1 class="page-title">Описание товара</h1>

    <div class="describe-wrap">
        <textarea
            class="describe-textarea"
            id="describe-ta"
            placeholder="Опишите ваш товар подробнее"
        ></textarea>
        <div class="charity-hint" id="charity-hint">
            Ваш товар подходит для благотворительного сбора вещей ❤️.
            <span class="charity-link" onclick="goToCharity()">Передать через фонд</span>
        </div>
    </div>

    <div class="bottom-bar">
        <button class="continue-btn" onclick="goNext()">Продолжить</button>
    </div>

    <script>
        const TRIGGER_WORDS = [
            'вещи пакет', 'одежд', 'обувь', 'куртк', 'пальт', 'шуб',
            'коляск', 'игрушк', 'детск', 'пиджак', 'костюм', 'майк',
            'футболк', 'аксессуар', 'варежк', 'шарф', 'конструктор'
        ];

        const CONDITION_NAMES = {
            'new-tag': 'Новое, с биркой',
            'excellent': 'Отличное',
            'good': 'Хорошее',
            'fair': 'Удовлетворительное'
        };

        const SPECS_DATA = {
            't-shirts':  { label: 'Футболки и майки',    color: 'Белый',   forWhom: 'Для девочек', brand: 'H&M',       size: '128' },
            'homewear':  { label: 'Домашняя одежда',      color: 'Розовый', forWhom: 'Для девочек', brand: 'Без бренда', size: '104' },
            'suits':     { label: 'Пиджаки и костюмы',   color: 'Синий',   forWhom: 'Для девочек', brand: 'Zara Kids', size: '116' }
        };

        const ta = document.getElementById('describe-ta');
        const hint = document.getElementById('charity-hint');

        ta.addEventListener('input', function() {
            ta.style.height = 'auto';
            ta.style.height = ta.scrollHeight + 'px';
            sessionStorage.setItem('mainDesc', ta.value);
            checkTrigger();
        });

        function checkTrigger() {
            const lower = ta.value.toLowerCase();
            const triggered = TRIGGER_WORDS.some(w => lower.includes(w));
            hint.classList.toggle('visible', triggered);
        }

        function buildFullDescription() {
            const cat = sessionStorage.getItem('mainCategory') || '';
            const condId = sessionStorage.getItem('mainCondition') || '';
            const specs = SPECS_DATA[cat];
            const descText = ta.value.trim();

            const parts = [];
            if (condId && CONDITION_NAMES[condId]) {
                parts.push('Состояние: ' + CONDITION_NAMES[condId]);
            }
            if (specs) {
                parts.push(`Цвет: ${specs.color}, Для кого: ${specs.forWhom}, Бренд: ${specs.brand}, Размер: ${specs.size}`);
            }
            if (descText) parts.push(descText);

            return parts.join('\n\n');
        }

        function goToCharity() {
            const desc = buildFullDescription();
            sessionStorage.setItem('adDesc', desc);
            sessionStorage.removeItem('adCategories');
            window.location.href = 'step5.html';
        }

        function goNext() {
            sessionStorage.setItem('adDesc', buildFullDescription());
            window.location.href = 'ads-2.html';
        }

        const saved = sessionStorage.getItem('mainDesc');
        if (saved) {
            ta.value = saved;
            ta.style.height = ta.scrollHeight + 'px';
            checkTrigger();
        }
    </script>

</body>
</html>
